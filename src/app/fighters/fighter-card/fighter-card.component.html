<div class="bg-white shadow rounded p-4" [class.opacity-50]="!fighter.active">
  <div class="flex items-center justify-between mb-2">
    <h2 class="text-lg font-bold">{{ fighter.name }}</h2>
    <span class="text-sm font-semibold" [class.text-green-600]="fighter.active" [class.text-gray-500]="!fighter.active">
      {{ getStatus() }}
    </span>
  </div>
  <p class="text-sm text-gray-500 mb-2">{{ fighter.nickname }}</p>
  <p class="text-sm">{{ fighter.weightDivision }} - {{ fighter.country }}</p>
  <p class="text-sm mb-4">Record: {{ getRecord() }}</p>
  <div class="flex items-center justify-between">
    <a [routerLink]="['/fighters', fighter.id]" class="text-blue-600 hover:underline text-sm">Edit</a>
    <button *ngIf="fighter.active" (click)="onDisable()" class="text-red-600 hover:underline text-sm">
      Disable
    </button>
  </div>
</div>
