<div
  class="bg-neutral-900 border-t-4 border-white shadow rounded p-4 w-72 h-44 flex flex-col justify-between overflow-hidden"
  [class.opacity-50]="!fighter.active"
>
  <div>
    <div class="flex items-center justify-between mb-2">
      <h2 class="text-lg font-bold text-white truncate">{{ fighter.name }}</h2>
      <span
        class="text-xs font-semibold px-3 py-1 rounded-full border shrink-0"
        [class.border-green-500]="fighter.active"
        [class.text-green-500]="fighter.active"
        [class.border-gray-500]="!fighter.active"
        [class.text-gray-400]="!fighter.active"
      >
        {{ getStatus() }}
      </span>
    </div>
    <p class="text-sm text-gray-400 mb-2 truncate">{{ fighter.nickname }}</p>
    <p class="text-sm text-gray-300 truncate">{{ fighter.weightDivision }} - {{ fighter.country }}</p>
    <p class="text-sm text-gray-300 mb-4">Record: {{ getRecord() }}</p>
  </div>
  <div class="flex items-center justify-between">
    <a
      [routerLink]="['/fighters', fighter.id]"
      class="text-xs font-semibold px-3 py-1 rounded-full border border-blue-500 text-blue-400 hover:bg-blue-500/10"
    >
      Edit
    </a>
    <button
      *ngIf="fighter.active"
      (click)="onDisable()"
      class="text-xs font-semibold px-3 py-1 rounded-full border border-red-500 text-red-500 hover:bg-red-500/10 cursor-pointer"
    >
      Disable
    </button>
    <button
      *ngIf="!fighter.active"
      (click)="onEnable()"
      class="text-xs font-semibold px-3 py-1 rounded-full border border-green-500 text-green-500 hover:bg-green-500/10 cursor-pointer"
    >
      Enable
    </button>
  </div>
</div>
