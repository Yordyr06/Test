<div class="min-h-screen bg-black p-6">
  <div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold text-white mb-6">
      {{ pageTitle() }}
    </h1>

    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      class="bg-neutral-900 border-t-4 border-white rounded p-6 space-y-4"
    >
      <div>
        <label class="block text-sm text-gray-300 mb-1">Name</label>
        <input
          type="text"
          formControlName="name"
          class="w-full bg-neutral-800 text-white border border-gray-600 rounded px-3 py-2"
        />
      </div>

      <div>
        <label class="block text-sm text-gray-300 mb-1">Nickname</label>
        <input
          type="text"
          formControlName="nickname"
          class="w-full bg-neutral-800 text-white border border-gray-600 rounded px-3 py-2"
        />
      </div>

      <div>
        <label class="block text-sm text-gray-300 mb-1">Weight division</label>
        <input
          type="text"
          formControlName="weightDivision"
          class="w-full bg-neutral-800 text-white border border-gray-600 rounded px-3 py-2"
        />
      </div>

      <div>
        <label class="block text-sm text-gray-300 mb-1">Country</label>
        <input
          type="text"
          formControlName="country"
          class="w-full bg-neutral-800 text-white border border-gray-600 rounded px-3 py-2"
        />
      </div>

      <div class="grid grid-cols-3 gap-3">
        <div>
          <label class="block text-sm text-gray-300 mb-1">Wins</label>
          <input
            type="number"
            formControlName="wins"
            class="w-full bg-neutral-800 text-white border border-gray-600 rounded px-3 py-2"
          />
        </div>
        <div>
          <label class="block text-sm text-gray-300 mb-1">Losses</label>
          <input
            type="number"
            formControlName="losses"
            class="w-full bg-neutral-800 text-white border border-gray-600 rounded px-3 py-2"
          />
        </div>
        <div>
          <label class="block text-sm text-gray-300 mb-1">Draws</label>
          <input
            type="number"
            formControlName="draws"
            class="w-full bg-neutral-800 text-white border border-gray-600 rounded px-3 py-2"
          />
        </div>
      </div>

      <div class="flex items-center justify-between pt-4">
        <div class="flex gap-3">
          <button
            type="submit"
            aria-label="Save"
            class="border border-blue-500 text-blue-400 rounded-full p-1.5 hover:bg-blue-500/10 cursor-pointer"
          >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
            </svg>
          </button>
          <button
            type="button"
            (click)="cancel()"
            aria-label="Cancel"
            class="border border-gray-500 text-gray-400 rounded-full p-1.5 hover:bg-gray-500/10 cursor-pointer"
          >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <button
          *ngIf="isEditMode() && isActive()"
          type="button"
          (click)="onDisable()"
          aria-label="Disable"
          class="border border-red-500 text-red-500 rounded-full p-1.5 hover:bg-red-500/10 cursor-pointer"
        >
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 0 0 5.636 5.636m12.728 12.728A9 9 0 0 1 5.636 5.636m12.728 12.728L5.636 5.636" />
          </svg>
        </button>
        <button
          *ngIf="isEditMode() && !isActive()"
          type="button"
          (click)="onEnable()"
          aria-label="Enable"
          class="border border-green-500 text-green-500 rounded-full p-1.5 hover:bg-green-500/10 cursor-pointer"
        >
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
          </svg>
        </button>
      </div>
    </form>
  </div>
</div>
