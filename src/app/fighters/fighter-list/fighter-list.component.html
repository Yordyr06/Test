<div class="min-h-screen bg-black p-6">
  <div class="max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-2">
        <img src="/ufc-logo.svg" alt="UFC" class="h-8" />
        <h1 class="text-3xl font-bold italic text-white">Record</h1>
      </div>
      <a
        routerLink="/fighters/new"
        aria-label="Add fighter"
        class="border border-white text-white p-3 rounded-full hover:bg-white/10 cursor-pointer"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
      </a>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 justify-items-center">
      <fighter-card
        *ngFor="let f of fightersService.fighters()"
        [fighter]="f"
        (disable)="onDisable($event)"
        (enable)="onEnable($event)"
      ></fighter-card>
    </div>

    <p *ngIf="fightersService.fighters().length === 0" class="text-center text-gray-400 mt-6">
      No fighters registered.
    </p>
  </div>
</div>
